<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Bãi Đỗ Xe SmartParking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        
        /* Form Đăng nhập */
        #login-section { text-align: center; margin-top: 50px; }
        .login-box { display: inline-block; padding: 30px; background: #e9ecef; border-radius: 8px; }
        .login-box input { display: block; margin: 10px auto; padding: 10px; width: 200px; }
        
        /* Các nút bấm và Tab */
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px;}
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #6c757d; }
        .tab-btn.active { background: #28a745; }
        
        /* Bảng dữ liệu */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .control-panel { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .control-box { padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
        <div class="login-box">
            <input type="text" id="maNV" placeholder="Mã nhân viên (VD: NV01)">
            <input type="password" id="matKhau" placeholder="Mật khẩu (VD: 123456)">
            <button onclick="dangNhap()">Đăng Nhập</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <div class="header">
            <h2 style="margin:0;">SmartParking - Vinh & Phúc</h2>
            <div>
                <span id="tenNhanVien" style="font-weight: bold; margin-right: 15px; color: #28a745;"></span>
                <button class="btn-danger" onclick="dangXuat()">Đăng xuất</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-truc-ca" onclick="chuyenTab('truc-ca')">🖥️ Ca Trực (Vào/Ra)</button>
            <button class="tab-btn" id="tab-admin" onclick="chuyenTab('admin')">👑 Quản Trị Admin</button>
        </div>

        <div id="sec-truc-ca" class="section active">
            <div class="control-panel">
                <div class="control-box">
                    <h3>Cho Xe Vào</h3>
                    <input type="text" id="theVao" placeholder="Mã thẻ (VD: T01)"><br><br>
                    <input type="text" id="bienSoVao" placeholder="Biển số (VD: 29A-123)"><br><br>
                    <button onclick="choXeVao()">Xác nhận Vào</button>
                </div>
                <div class="control-box">
                    <h3>Cho Xe Ra</h3>
                    <input type="text" id="theRa" placeholder="Mã thẻ (VD: T01)"><br><br>
                    <button class="btn-danger" onclick="choXeRa()">Xác nhận Ra</button>
                </div>
            </div>
            <h3>Danh sách xe ĐANG TRONG BÃI</h3>
            <table>
                <thead>
                    <tr>
                        <th>Biển số</th><th>Mã lượt</th><th>Mã thẻ</th><th>Chủ xe</th><th>Giờ vào</th>
                    </tr>
                </thead>
                <tbody id="bang-xe-trong-bai"></tbody>
            </table>
        </div>

        <div id="sec-admin" class="section">
            <div class="control-box" style="margin-bottom: 20px; border-left: 5px solid #dc3545;">
                <h3 style="color: #dc3545;">Khóa Thẻ Khẩn Cấp (Báo Mất)</h3>
                <input type="text" id="theMat" placeholder="Nhập mã thẻ bị mất...">
                <button class="btn-danger" onclick="khoaThe()">Khóa Thẻ Ngay</button>
            </div>

            <h3>Sổ Cái - Lịch Sử Giao Dịch</h3>
            <button onclick="loadLichSu()" style="margin-bottom: 10px;">🔄 Làm mới dữ liệu</button>
            <table>
                <thead>
                    <tr>
                        <th>Mã Lượt</th><th>Biển Số</th><th>Mã Thẻ</th><th>Giờ Vào</th><th>Giờ Ra</th><th>Tổng Tiền</th><th>Người Thu</th>
                    </tr>
                </thead>
                <tbody id="bang-lich-su"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api";

    // --- CÁC HÀM XỬ LÝ GIAO DIỆN ---
    function chuyenTab(tabName) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById('sec-' + tabName).classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');

        if(tabName === 'admin') loadLichSu();
        if(tabName === 'truc-ca') loadXeTrongBai();
    }

    // --- CÁC HÀM GỌI API BACKEND ---
    function dangNhap() {
        let ma_nv = document.getElementById('maNV').value;
        let mat_khau = document.getElementById('matKhau').value;

        fetch(`${API_URL}/dang-nhap`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ma_nv: ma_nv, mat_khau: mat_khau })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('tenNhanVien').innerText = "Xin chào, " + data.ten_nv;
                loadXeTrongBai(); // Tự động load dữ liệu
            } else {
                alert(data.message);
            }
        });
    }

    function dangXuat() {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('maNV').value = '';
        document.getElementById('matKhau').value = '';
    }

    function loadXeTrongBai() {
        fetch(`${API_URL}/xe-trong-bai`)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(xe => {
                html += `<tr><td>${xe.BienSo}</td><td>${xe.MaLuot}</td><td>${xe.LoaiThe}</td><td>${xe.ChuXe}</td><td>${xe.GioVao}</td></tr>`;
            });
            document.getElementById('bang-xe-trong-bai').innerHTML = html;
        });
    }

    function choXeVao() {
        let maThe = document.getElementById('theVao').value;
        let bienSo = document.getElementById('bienSoVao').value;
        fetch(`${API_URL}/cho-xe-vao`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ maThe: maThe, bienSo: bienSo })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            if(data.status === 'success') loadXeTrongBai();
        });
    }

    function choXeRa() {
        let maThe = document.getElementById('theRa').value;
        fetch(`${API_URL}/cho-xe-ra`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ maThe: maThe })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            if(data.status === 'success') loadXeTrongBai();
        });
    }

    function loadLichSu() {
        fetch(`${API_URL}/lich-su`)
        .then(res => res.json())
        .then(data => {
            let html = "";
            data.forEach(gd => {
                html += `<tr><td>${gd.MaLuot}</td><td>${gd.BienSo}</td><td>${gd.MaThe}</td><td>${gd.ThoiGianVao}</td><td>${gd.ThoiGianRa}</td><td>${gd.TongTien} VNĐ</td><td>${gd.NguoiThuTien}</td></tr>`;
            });
            document.getElementById('bang-lich-su').innerHTML = html;
        });
    }

    function khoaThe() {
        let ma_the = document.getElementById('theMat').value;
        if(!confirm(`Bạn có chắc chắn muốn KHÓA thẻ ${ma_the} không?`)) return;

        fetch(`${API_URL}/khoa-the`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ma_the: ma_the })
        })
        .then(res => res.json())
        .then(data => alert(data.message));
    }
</script>

</body>
</html>
